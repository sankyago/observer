services:
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 -W 3 | grep -q . || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 3

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: observer
      POSTGRES_PASSWORD: observer
      POSTGRES_DB: observer
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U observer"]
      interval: 5s
      timeout: 5s
      retries: 3

  app:
    build: .
    depends_on:
      timescaledb:
        condition: service_healthy
      mosquitto:
        condition: service_started
    environment:
      DATABASE_URL: postgres://observer:observer@timescaledb:5432/observer?sslmode=disable
      HTTP_ADDR: ":8080"
      MIGRATIONS_DIR: /migrations
    ports:
      - "8080:8080"
