services:
  postgres:
    image: timescale/timescaledb:2.17.2-pg16
    container_name: observer-postgres
    environment:
      POSTGRES_USER: observer
      POSTGRES_PASSWORD: observer
      POSTGRES_DB: observer
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U observer"]
      interval: 5s
      timeout: 3s
      retries: 10

  emqx:
    image: emqx/emqx:5.8.3
    container_name: observer-emqx
    ports:
      - "1883:1883"
      - "8083:8083"
      - "18083:18083"
    environment:
      EMQX_DASHBOARD__DEFAULT_PASSWORD: observer
      EMQX_ALLOW_ANONYMOUS: "true"
      EMQX_LISTENERS__TCP__DEFAULT__ENABLE_AUTHN: "false"
    healthcheck:
      test: ["CMD", "emqx", "ctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
